<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect — System Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid rgba(99, 102, 241, 0.25);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.35);
        }
        .logo h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        .logo h1 span { color: #818cf8; }
        .header-hint {
            font-size: 12px;
            color: #64748b;
            background: rgba(30, 41, 59, 0.8);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        /* ── Diagram Canvas ── */
        #diagram-canvas {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }
        #diagram-canvas:active { cursor: grabbing; }

        /* ── Floating Controls ── */
        .controls {
            position: absolute;
            bottom: 24px;
            left: 24px;
            display: flex;
            gap: 8px;
            z-index: 50;
        }
        .ctrl-btn {
            width: 42px; height: 42px;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #334155;
            border-radius: 12px;
            color: #94a3b8;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .ctrl-btn:hover { background: #334155; color: #e2e8f0; border-color: #6366f1; }

        /* ── Legend (floating bottom-right) ── */
        .legend {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 16px 20px;
            backdrop-filter: blur(12px);
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .legend-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 2px; }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #94a3b8;
        }
        .legend-dot {
            width: 14px; height: 14px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        /* ── Key Notes (floating top-right) ── */
        .key-notes {
            position: absolute;
            top: 16px;
            right: 24px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 18px 22px;
            max-width: 380px;
            backdrop-filter: blur(12px);
            z-index: 50;
        }
        .key-notes-title {
            font-size: 13px;
            font-weight: 700;
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .key-notes ul {
            list-style: none;
            padding: 0;
        }
        .key-notes li {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
            padding: 5px 0;
            padding-left: 18px;
            position: relative;
        }
        .key-notes li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: #6366f1;
            font-size: 13px;
        }

        /* ── Tooltip ── */
        .tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid #475569;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 12px;
            color: #cbd5e1;
            max-width: 260px;
            line-height: 1.5;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .tooltip .tt-title {
            font-weight: 700;
            font-size: 13px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        /* ── SVG Node and Link Styles ── */
        .link-path {
            fill: none;
            stroke-width: 2;
            opacity: 0.5;
        }
        .node-group { cursor: pointer; }
        .node-group text {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            fill: #e2e8f0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">🏥</div>
        <h1>Medi<span>Connect</span> — System Design</h1>
    </div>
    <div class="header-hint">🖱️ Click nodes to expand · Scroll to zoom · Drag to pan</div>
</header>

<div id="diagram-canvas">
    <!-- Controls -->
    <div class="controls">
        <button class="ctrl-btn" id="zoom-in" title="Zoom In">+</button>
        <button class="ctrl-btn" id="zoom-out" title="Zoom Out">−</button>
        <button class="ctrl-btn" id="zoom-fit" title="Fit View">⊡</button>
        <button class="ctrl-btn" id="expand-all" title="Expand All">⊞</button>
    </div>

    <!-- Key Notes -->
    <div class="key-notes">
        <div class="key-notes-title">⚡ Key System Notes</div>
        <ul id="key-notes-list"></ul>
    </div>

    <!-- Legend -->
    <div class="legend">
        <div class="legend-title">Legend</div>
        <div class="legend-item"><div class="legend-dot" style="background: linear-gradient(135deg, #6366f1, #818cf8);"></div> Core System</div>
        <div class="legend-item"><div class="legend-dot" style="background: linear-gradient(135deg, #ec4899, #f472b6);"></div> User / Patient Flow</div>
        <div class="legend-item"><div class="legend-dot" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);"></div> Admin Panel</div>
        <div class="legend-item"><div class="legend-dot" style="background: linear-gradient(135deg, #10b981, #34d399);"></div> Doctor Panel</div>
        <div class="legend-item"><div class="legend-dot" style="background: linear-gradient(135deg, #06b6d4, #22d3ee);"></div> Shared Services</div>
        <div class="legend-item"><div class="legend-dot" style="background: linear-gradient(135deg, #8b5cf6, #a78bfa);"></div> Decision / Check</div>
        <div class="legend-item"><div class="legend-dot" style="background: linear-gradient(135deg, #ef4444, #f87171);"></div> Super Admin</div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tt-title" id="tt-title"></div>
        <div id="tt-body"></div>
    </div>
</div>

<script src="diagramData.js"></script>
<script src="diagramEngine.js"></script>
</body>
</html>
